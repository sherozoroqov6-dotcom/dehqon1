services:
  - type: web
    name: dehqon-bot
    runtime: node
    plan: free
    buildCommand: npm install googleapis --no-save --ignore-scripts
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: dehqon-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: dehqon-db
    plan: free
    databaseName: dehqon_db
    user: dehqon_user
